<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gmail Quote Selected — Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #f8f9fa;
      padding: 32px;
      max-width: 520px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #5f6368;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #5f6368;
    }

    .hint a {
      color: #1a73e8;
      text-decoration: none;
    }

    .hint a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1557b0; }
    button:active { background: #0d47a1; }

    #status {
      font-size: 13px;
      min-height: 18px;
      transition: opacity 0.3s;
    }

    #status.ok  { color: #188038; }
    #status.err { color: #c5221f; }

    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 28px 0;
    }

    .info-box {
      background: #e8f0fe;
      border-left: 4px solid #1a73e8;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .info-box code {
      font-family: 'Courier New', Courier, monospace;
      background: rgba(0,0,0,0.07);
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Gmail Quote Selected</h1>
  <p class="subtitle">Extension settings</p>

  <div class="field">
    <label for="appId">InboxSDK App ID</label>
    <input
      type="text"
      id="appId"
      placeholder="sdk_yourname_0000000000"
      autocomplete="off"
      spellcheck="false"
    >
    <p class="hint">
      Register a free App ID at
      <a href="https://www.inboxsdk.com/" target="_blank" rel="noopener">inboxsdk.com</a>.
      Required for the extension to interact with Gmail's compose UI.
    </p>
  </div>

  <div class="actions">
    <button id="save">Save</button>
    <span id="status"></span>
  </div>

  <hr class="divider">

  <div class="info-box">
    After saving, reload any open Gmail tabs and click
    <strong>Reload</strong> on the extension card in
    <code>chrome://extensions</code> for the change to take effect.
  </div>

  <script src="options.js"></script>
</body>
</html>
